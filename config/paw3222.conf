# Selects PAW3222 sensor variant for the mona2 trackball.
# Used via build.yaml: cmake-args: -DEXTRA_CONF_FILE="paw3222.conf"
# Switches the trackball_central node compatible to pixart,paw3222
# (see mona2_r.overlay #ifdef CONFIG_TRACKBALL_PAW3222).

CONFIG_TRACKBALL_PAW3222=y
CONFIG_PAW3222=y
CONFIG_PMW3610=n
