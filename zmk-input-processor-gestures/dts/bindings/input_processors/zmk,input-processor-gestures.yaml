description: Input processor for turning relative XY movement into directional behavior taps

compatible: "zmk,input-processor-gestures"

include: ip_zero_param.yaml

properties:
  "#input-processor-cells":
    type: int
    const: 0
  type:
    type: int
  x-code:
    type: int
  y-code:
    type: int
  threshold:
    type: int
    description: "Minimum displacement (in REL units) to trigger a gesture (default: 120)"
  timeout-ms:
    type: int
    description: "Time window in ms to accumulate displacement (default: 180)"
  cooldown-ms:
    type: int
    description: "Cooldown in ms between consecutive gestures (default: 220)"
  tap-ms:
    type: int
    description: "Duration in ms for the triggered key tap (default: 30)"
  layer-id:
    type: int
    required: true
    description: "Keymap layer to read behavior bindings from"
  positions:
    type: array
    required: true
    description: "Key positions for [up, down, left, right] gestures"
  active-layers:
    type: int
    description: "Bitmask of layers on which this processor is active. 0 (default) means active on all layers."
